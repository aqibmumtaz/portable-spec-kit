      Either (a) the probe heuristic is wrong for single-orchestrator multi-wave model OR
      (b) cycle-17 genuinely had only 1 Read call across 75 findings (suggesting parallel waves'
      Read counts were not aggregated). Either way: probe + cycle-17 disagree, gate 13 self-blocks
      every multi-wave pass, kit cannot trust its own self-test.
    standard: "portable-spec-kit.md §Spawn Fidelity → 13th mechanical gate (audit-completeness)"
    recommendation: |
      Three options (pick one):
      (a) Fix qa-usage aggregation: orchestrator's post-merge step aggregates tool-usage across
          all sub-agent waves (currently aggregating only orchestrator's own usage).
      (b) Recalibrate Probe 27.1 heuristic: adjust file_read_trace_coverage signature to look for
          per-sub-agent qa-usage-dims-N-to-M.yaml files and sum across them.
      (c) Re-run cycle-17 with corrected qa-usage emission (per cycle-17 exit-criterion #2).
    regression_vector:
      invocation_verbatim: "bash reflex/lib/check-audit-completeness.sh reflex/history/cycle-17/pass-001 --json | jq -r .verdict"
      expected_assertion: "real (when probe + qa-usage aggregation reconciled)"
