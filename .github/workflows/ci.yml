name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    name: Run test suites
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Framework tests (43 sections)
        run: bash tests/test-spec-kit.sh

      - name: SPD benchmarking suite (5 projects)
        run: bash tests/test-spd-benchmarking.sh

      - name: R→F→T release validator
        run: bash tests/test-release-check.sh agent/SPECS.md
